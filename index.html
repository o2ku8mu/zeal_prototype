      const [answers, setAnswers] = useState(Array(10).fill(null));
      const [resultData, setResultData] = useState(null);

      const handleStart = () => {
        setStep('quiz');
        setCurrentQIndex(0);
        setAnswers(Array(10).fill(null));
      };

      const handleAnswer = (value) => {
        const newAnswers = [...answers];
        newAnswers[currentQIndex] = value;
        setAnswers(newAnswers);

        if (currentQIndex < 9) {
          setTimeout(() => setCurrentQIndex(currentQIndex + 1), 300);
        } else {
          calculateResult(newAnswers);
        }
      };

      const calculateResult = (finalAnswers) => {
        const getScore = (qIndex, isReverse) => {
          const val = finalAnswers[qIndex];
          return isReverse ? 8 - val : val;
        };

        const scores = {
          extraversion: getScore(0, false) + getScore(5, true),
          agreeableness: getScore(1, true) + getScore(6, false),
          conscientiousness: getScore(2, false) + getScore(7, true),
          neuroticism: getScore(3, true) + getScore(8, false),
          openness: getScore(4, false) + getScore(9, true),
        };

        const zScores = {
          neuroticism: (scores.neuroticism - MEANS.neuroticism) / SDS.neuroticism,
          extraversion: (scores.extraversion - MEANS.extraversion) / SDS.extraversion,
          openness: (scores.openness - MEANS.openness) / SDS.openness,
          agreeableness: (scores.agreeableness - MEANS.agreeableness) / SDS.agreeableness,
          conscientiousness: (scores.conscientiousness - MEANS.conscientiousness) / SDS.conscientiousness,
        };

        let minDistance = Infinity;
        let closestType = '';

        for (const [type, center] of Object.entries(typeCenters)) {
          const distance = Math.sqrt(
            Math.pow(zScores.neuroticism - center.neuroticism, 2) +
            Math.pow(zScores.extraversion - center.extraversion, 2) +
            Math.pow(zScores.openness - center.openness, 2) +
            Math.pow(zScores.agreeableness - center.agreeableness, 2) +
            Math.pow(zScores.conscientiousness - center.conscientiousness, 2)
          );
          if (distance < minDistance) {
            minDistance = distance;
            closestType = type;
          }
        }

        const clamp = (val) => Math.max(0, Math.min(100, val));

        const tScores = {
          外向性: clamp(zScores.extraversion * 10 + 50),
          協調性: clamp(zScores.agreeableness * 10 + 50),
          勤勉性: clamp(zScores.conscientiousness * 10 + 50),
          情緒安定: clamp(zScores.neuroticism * 10 + 50),
          開放性: clamp(zScores.openness * 10 + 50),
        };

        setResultData({ type: closestType, tScores });
        setTimeout(() => setStep('result'), 400);
      };

            return <strong key={i} className="text-purple-700 font-black">{part.slice(2, -2)}</strong>;

          return part;

                        <button
                          key={choice.value}
                          onClick={() => handleAnswer(choice.value)}
                          className={`
                            w-full py-4 px-6 rounded-2xl text-left font-bold transition-all duration-200 border-2
                            ${answers[currentQIndex] === choice.value 
                              ? 'bg-purple-50 border-purple-500 text-purple-700 shadow-md' 
                              : 'bg-white border-slate-100 text-slate-600 hover:bg-slate-50 hover:border-purple-200'}
                          `}
                        >
                          {choice.label}
                        </button>
                      ))}
                    </div>
                  </div>
                </motion.div>
              )}

              {step === 'result' && currentTypeInfo && (
                <motion.div
                  key="result"
                  initial={{ opacity: 0, scale: 0.95 }}
                  animate={{ opacity: 1, scale: 1 }}
                  transition={{ duration: 0.5 }}
                  className="flex-1 flex flex-col mt-6"
                >
                  <div className="bg-white border border-purple-100 rounded-3xl p-6 md:p-10 mb-8 shadow-xl shadow-purple-900/5 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-orange-100 rounded-bl-full opacity-50"></div>
                    
                    <div className="flex flex-col md:flex-row items-center gap-4 md:gap-6 relative z-10 mb-8 border-b border-slate-100 pb-8">
                      <div className="w-24 h-24 md:w-28 md:h-28 shrink-0 rounded-full bg-purple-50 border-[3px] border-white shadow-lg shadow-purple-900/10 overflow-hidden flex items-center justify-center relative">
                        <img 
                          src={currentTypeInfo.imageUrl} 
                          alt={currentTypeInfo.name} 
                          className="w-[85%] h-[85%] object-contain" 
                        />
                      </div>
                      
                      <div className="text-center md:text-left flex-1">
                        <p className="text-orange-500 font-bold tracking-widest uppercase text-xs md:text-sm mb-2">Analysis Result</p>
                        {/* --- スマホで改行されないよう文字サイズ調整と whitespace-nowrap を追加 --- */}
                        <h2 className="text-[1.35rem] sm:text-2xl md:text-4xl font-black mb-3 text-slate-800 whitespace-nowrap">
                          あなたは <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-700 to-purple-500">{currentTypeInfo.name}</span> タイプ
                        </h2>
                        <p className="text-lg md:text-xl text-slate-600 font-bold">〜 {currentTypeInfo.subtitle} 〜</p>
                      </div>
                    </div>

                    {currentTypeInfo.description && (
                      <p className="text-slate-600 leading-relaxed mb-10 text-lg md:text-xl font-medium text-center md:text-left">
                        {currentTypeInfo.description}
                      </p>
                    )}

                    <div className="w-full bg-slate-50/50 rounded-3xl p-4 md:p-6 shadow-inner border border-slate-100">
                      <div className="space-y-5 md:space-y-6">
                        {traitsData.map((trait, index) => (
                          <div key={index} className="flex flex-col">
                            <div className="relative h-10 md:h-12 w-full flex rounded-full overflow-hidden shadow-sm mb-2">
                              <div className="w-1/2 bg-[#6bba9f] flex items-center px-4 relative">
                                <trait.IconLeft className="text-white opacity-80 w-4 h-4 md:w-5 md:h-5 shrink-0" strokeWidth={1.5} />
                                <div className="absolute inset-0 flex items-center justify-evenly px-10 md:px-14 pointer-events-none">
                                  <div className="w-[1px] h-2 bg-white/40"></div>
                                  <div className="w-[1px] h-2 bg-white/40"></div>
                                  <div className="w-[1px] h-2 bg-white/40"></div>
                                  <div className="w-[1px] h-2 bg-white/40"></div>
                                </div>
                              </div>
                              <div className="w-1/2 bg-[#2d76b5] flex items-center justify-end px-4 relative">
                                <div className="absolute inset-0 flex items-center justify-evenly px-10 md:px-14 pointer-events-none">
                                  <div className="w-[1px] h-2 bg-white/40"></div>
                                  <div className="w-[1px] h-2 bg-white/40"></div>
                                  <div className="w-[1px] h-2 bg-white/40"></div>
                                  <div className="w-[1px] h-2 bg-white/40"></div>
                                </div>
                                <trait.IconRight className="text-white opacity-80 w-4 h-4 md:w-5 md:h-5 shrink-0" strokeWidth={1.5} />
                              </div>
                              <div className="absolute left-1/2 top-0 bottom-0 w-0.5 bg-white -translate-x-1/2 z-10"></div>
                              
                              <motion.div 
                                initial={{ left: '50%' }}
                                animate={{ left: `${trait.score}%` }}
                                transition={{ delay: 0.3 + index * 0.1, type: 'spring', stiffness: 50, damping: 10 }}
                                className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 z-20 flex items-center justify-center"
                              >
                                <div 
                                  className="w-8 h-8 md:w-10 md:h-10 bg-white flex items-center justify-center drop-shadow-md"
                                  style={{ clipPath: 'polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)' }}
                                >
                                  <div 
                                    className="w-[1.6rem] h-[1.6rem] md:w-[2rem] md:h-[2rem] bg-[#f59e0b] flex items-center justify-center text-white font-bold text-xs md:text-sm"
                                    style={{ clipPath: 'polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)' }}
                                  >
                                    {Math.round(Math.abs(trait.score - 50))}
                                  </div>
                                </div>
                              </motion.div>
                            </div>

                            <div className="flex justify-between items-center px-2">
                              <span className="text-[#6bba9f] font-bold text-[10px] md:text-xs w-1/3 text-left">{trait.leftLabel}</span>
                              <span className="text-slate-500 font-bold text-[10px] md:text-xs w-1/3 text-center">{trait.centerLabel}</span>
                              <span className="text-[#2d76b5] font-bold text-[10px] md:text-xs w-1/3 text-right">{trait.rightLabel}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4 md:space-y-6 mb-12">
                    <div className="bg-white border-l-4 border-purple-500 p-6 md:p-8 rounded-r-2xl shadow-md shadow-slate-200/50">
                      <h3 className="flex items-center gap-3 text-xl font-black text-slate-800 mb-3">
                        <Smile className="text-purple-500" size={26} />
                        楽しむために
                      </h3>
                      <p className="text-slate-600 leading-relaxed font-medium">
                        {renderText(currentTypeInfo.enjoy)}
                      </p>
                    </div>

                    <div className="bg-white border-l-4 border-orange-500 p-6 md:p-8 rounded-r-2xl shadow-md shadow-slate-200/50">
                      <h3 className="flex items-center gap-3 text-xl font-black text-slate-800 mb-3">
                        <Trophy className="text-orange-500" size={26} />
                        結果を出すために
                      </h3>
                      <p className="text-slate-600 leading-relaxed font-medium">
                        {renderText(currentTypeInfo.result)}
                      </p>
                    </div>

                    <div className="bg-purple-50 border-l-4 border-purple-700 p-6 md:p-8 rounded-r-2xl shadow-md shadow-slate-200/50">
                      <h3 className="flex items-center gap-3 text-xl font-black text-purple-800 mb-3">
                        <Repeat className="text-purple-700" size={26} />
                        継続するために
                      </h3>
                      <p className="text-purple-900 leading-relaxed font-bold">
                        {renderText(currentTypeInfo.continue)}
                      </p>
                    </div>
                  </div>

                  <div className="text-center">
                    <button 
                      onClick={() => setStep('top')}
                      className="inline-flex items-center gap-2 text-slate-400 hover:text-purple-600 font-bold transition-colors"
                    >
                      <RefreshCcw size={18} />
                      最初からやり直す
                    </button>
                  </div>
                </motion.div>
              )}

            </AnimatePresence>
          </main>
        </div>
      );
    }

    // ReactアプリをHTMLにマウント
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
